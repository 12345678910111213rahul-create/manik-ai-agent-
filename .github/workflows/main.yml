name: Manik AI Agent — Daily Run

on:
  schedule:
    # Roz subah 7 baje IST (1:30 UTC)
    - cron: '30 1 * * *'
  
  # Manual bhi chala sako
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    
    steps:
      - name: Code lo
        uses: actions/checkout@v3
      
      - name: Python setup karo
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Libraries install karo
        run: pip install cohere requests
      
      - name: Agent chalao!
        env:
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
        run: python Agent.py
